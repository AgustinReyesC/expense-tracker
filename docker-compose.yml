services:
  mongo:
    image: mongo:7
    container_name: expense_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: expense_tracker

  backend:
    build: ./backend
    container_name: expense_backend
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

volumes:
  mongo_data: